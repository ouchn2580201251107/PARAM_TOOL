{% extends 'parameter/base.html' %}

{% block content %}
<div class="page-header">
    <h2>新建用户</h2>
    <p>创建新的系统用户账号</p>
</div>

<div class="content-section">
    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}
    
    <form method="post" class="form-horizontal">
        {% csrf_token %}
        <div class="form-group">
            <label>用户名 <span class="required">*</span></label>
            <input type="text" name="username" class="form-control" placeholder="请输入用户名" required>
        </div>
        
        <div class="form-group">
            <label>密码 <span class="required">*</span></label>
            <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
        </div>
        
        <div class="form-group">
            <label>确认密码 <span class="required">*</span></label>
            <input type="password" name="confirm_password" class="form-control" placeholder="请再次输入密码" required>
        </div>
        
        <div class="form-group">
            <label>真实姓名</label>
            <input type="text" name="real_name" class="form-control" placeholder="请输入真实姓名">
        </div>
        
        <div class="form-group">
            <label>工号</label>
            <input type="text" name="employee_id" class="form-control" placeholder="5-7位纯数字" pattern="[0-9]{5,7}" title="请输入5-7位纯数字">
        </div>
        
        <div class="form-group">
            <label>邮箱</label>
            <input type="email" name="email" class="form-control" placeholder="请输入邮箱地址">
        </div>
        
        <div class="form-group">
            <label>手机号</label>
            <input type="tel" name="phone" class="form-control" placeholder="请输入手机号">
        </div>
        
        <div class="form-group">
            <label>角色 <span class="required">*</span></label>
            <select name="role" class="form-control" required>
                <option value="">请选择角色</option>
                {% for role in roles %}
                <option value="{{ role.id }}">{{ role.role_name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">创建用户</button>
            <a href="/users/" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
