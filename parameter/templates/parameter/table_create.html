{% extends 'parameter/base.html' %}

{% block title %}创建参数表{% endblock %}

{% block content %}
    <div class="card">
        <div class="card-title"><i class="fas fa-list-alt"></i> 创建参数表</div>
        {% if error %}
        <div style="color: #e74c3c; margin-bottom: 16px;">{{ error }}</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>英文名称（正式名称） *</label>
                <input type="text" name="name_en" value="{{ data.name_en|default:'' }}" required placeholder="由大写字母和下划线组成，如：USER_INFO">
            </div>
            <div class="form-group">
                <label>中文名称 *</label>
                <input type="text" name="name" value="{{ data.name|default:'' }}" required placeholder="用于解释说明">
            </div>
            <div class="form-group">
                <label>业务说明 *</label>
                <textarea name="business_description" required placeholder="请输入业务说明">{{ data.business_description|default:'' }}</textarea>
            </div>
            <div class="form-group">
                <label>业务领域 *</label>
                <input type="text" name="domain" value="{{ data.domain|default:'' }}" required placeholder="请输入业务领域">
            </div>
            <div class="form-group">
                <label>负责人 *</label>
                <input type="text" name="owner" value="{{ data.owner|default:'' }}" required placeholder="请输入负责人">
            </div>
            <div class="form-group">
                <label>状态</label>
                <select name="status">
                    {% for status in statuses %}
                    <option value="{{ status.value }}" {% if data.status == status.value %}selected{% endif %}>{{ status.label }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div>
                <button type="submit" class="btn btn-success">创建</button>
                <a href="/tables/" class="btn btn-primary">取消</a>
            </div>
        </form>
    </div>
{% endblock %}
