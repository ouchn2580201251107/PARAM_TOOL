{% extends 'parameter/base.html' %}

{% block content %}
<div class="page-header">
    <h2>修改密码</h2>
    <p>修改您的登录密码</p>
</div>

<div class="content-section">
    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}
    
    {% if success %}
    <div class="success-message">{{ success }}</div>
    {% endif %}
    
    <form method="post" class="form-horizontal">
        {% csrf_token %}
        <div class="form-group">
            <label>旧密码 <span class="required">*</span></label>
            <input type="password" name="old_password" class="form-control" placeholder="请输入旧密码" required>
        </div>
        
        <div class="form-group">
            <label>新密码 <span class="required">*</span></label>
            <input type="password" name="new_password" class="form-control" placeholder="请输入新密码" required>
        </div>
        
        <div class="form-group">
            <label>确认新密码 <span class="required">*</span></label>
            <input type="password" name="confirm_password" class="form-control" placeholder="请再次输入新密码" required>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">修改密码</button>
            <a href="/" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
