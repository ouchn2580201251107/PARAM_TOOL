{% extends 'parameter/base.html' %}

{% block title %}编辑成品表复用配置{% endblock %}

{% block content %}
    <div class="card">
        <div class="card-title"><i class="fas fa-key"></i> 编辑成品表复用配置</div>
        {% if error %}
        <div style="color: #e74c3c; margin-bottom: 16px;">{{ error }}</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>成品表 *</label>
                <select name="product_table" required>
                    {% for table in product_tables %}
                    <option value="{{ table.0 }}" {% if config.product_table == table.0 %}selected{% endif %}>{{ table.1 }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>索引标识(INDEXID/TAG) *</label>
                <input type="text" name="index_id" value="{{ config.index_id }}" required placeholder="请输入索引标识">
                <small style="color: #888;">物理表名：{{ config.table_name }}</small>
            </div>
            <div class="form-group">
                <label>业务名称 *</label>
                <input type="text" name="business_name" value="{{ config.business_name }}" required placeholder="请输入业务名称">
            </div>
            <div class="form-group">
                <label>业务说明</label>
                <textarea name="business_description" placeholder="请输入业务说明">{{ config.business_description }}</textarea>
            </div>
            <div>
                <button type="submit" class="btn btn-success">保存</button>
                <a href="/product-table/" class="btn btn-primary">取消</a>
            </div>
        </form>
    </div>
{% endblock %}
