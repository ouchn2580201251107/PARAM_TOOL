{% extends 'parameter/base.html' %}

{% block title %}编辑需求{% endblock %}

{% block content %}
    <div class="card">
        <div class="card-title"><i class="fas fa-pencil-alt"></i> 业务需求登记 - 编辑需求</div>
        {% if error %}
        <div style="color: #e74c3c; margin-bottom: 16px;">{{ error }}</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>需求编号 *</label>
                <input type="text" name="requirement_no" value="{{ requirement.requirement_no }}" required placeholder="请输入需求编号">
            </div>
            <div class="form-group">
                <label>需求标题 *</label>
                <input type="text" name="title" value="{{ requirement.title }}" required placeholder="请输入需求标题">
            </div>
            <div class="form-group">
                <label>需求类型 *</label>
                <select name="requirement_type">
                    {% for type in types %}
                    <option value="{{ type.0 }}" {% if requirement.requirement_type == type.0 %}selected{% endif %}>{{ type.1 }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>关联参数表</label>
                <select name="parameter_table">
                    <option value="">请选择参数表（可选）</option>
                    {% for table in tables %}
                    <option value="{{ table.id }}" {% if requirement.parameter_table_id == table.id %}selected{% endif %}>{{ table.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>业务说明 *</label>
                <textarea name="business_description" required placeholder="请输入业务说明">{{ requirement.business_description }}</textarea>
            </div>
            <div class="form-group">
                <label>状态</label>
                <select name="status">
                    {% for status in statuses %}
                    <option value="{{ status.0 }}" {% if requirement.status == status.0 %}selected{% endif %}>{{ status.1 }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>故事点</label>
                <input type="number" name="story_points" value="{{ requirement.story_points }}" placeholder="请输入故事点">
            </div>
            <div class="form-group">
                <label>冲刺</label>
                <input type="text" name="sprint" value="{{ requirement.sprint }}" placeholder="如：Sprint-1">
            </div>
            <div class="form-group">
                <label>项目管理平台ID</label>
                <input type="text" name="project_platform_id" value="{{ requirement.project_platform_id }}" placeholder="如：ZD-2024-001">
            </div>
            <div class="form-group">
                <label>申请人</label>
                <input type="text" name="requester" value="{{ requirement.requester }}" readonly>
            </div>
            <div style="margin-top: 20px;">
                <button type="submit" class="btn btn-success">保存</button>
                <a href="/requirements/" class="btn btn-primary">返回列表</a>
            </div>
        </form>
    </div>
{% endblock %}
